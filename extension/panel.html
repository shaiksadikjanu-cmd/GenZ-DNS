<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:         #0a0a0a;
    --surface:    #121212;
    --surface2:   #1a1a1a;
    --surface3:   #242424;
    --border:     #262626;
    --text:       #ededed;
    --text2:      #9a9a9a;
    --text3:      #5e5e5e;
    --accent:     #00ffcc;
    --accent-dim: rgba(0,255,204,0.08);
    --danger:     #ff5b5b;
    --font-mono:  "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --font-sans:  -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 320px; min-height: 100vh;
    background: var(--bg); color: var(--text);
    font-family: var(--font-sans);
    overflow-x: hidden;
  }

  /* topbar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .brand {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }
  .brand b { color: var(--accent); }

  /* search row */
  .search-wrap {
    display: flex; gap: 6px; position: relative;
  }
  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 150ms;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .go-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 0 14px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 120ms;
    font-family: var(--font-sans);
  }
  .go-btn:hover { background: #4cffd9; }

  /* autocomplete dropdown */
  .autocomplete {
    position: absolute;
    top: calc(100% + 4px); left: 0; right: 42px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    z-index: 50;
    display: none;
  }
  .autocomplete.open { display: block; }
  .ac-item {
    padding: 9px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 80ms;
  }
  .ac-item:hover { background: var(--surface3); color: var(--text); }
  .ac-item .ac-star { color: var(--accent); font-size: 10px; }

  /* sections */
  .section { padding: 14px 16px 0; }
  .section-label {
    font-size: 10px; font-weight: 600;
    color: var(--text3); letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .clear-btn {
    font-size: 10px; color: var(--text3);
    background: none; border: none; cursor: pointer;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 0; font-family: var(--font-sans);
  }
  .clear-btn:hover { color: var(--danger); }

  /* domain rows */
  .domain-row {
    display: flex; align-items: center;
    gap: 8px; padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 120ms, background 120ms;
  }
  .domain-row:hover { border-color: var(--accent); background: var(--surface3); }
  .domain-row .name {
    flex: 1; font-family: var(--font-mono);
    font-size: 12px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .domain-row .sub {
    font-size: 10px; color: var(--text3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .star-btn {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 14px; padding: 2px 4px;
    border-radius: 4px; transition: color 120ms;
    flex-shrink: 0;
  }
  .star-btn.active { color: var(--accent); }
  .star-btn:hover { color: var(--accent); }

  .empty {
    font-size: 12px; color: var(--text3);
    text-align: center; padding: 16px 0;
    font-family: var(--font-mono);
  }

  /* portal link at bottom */
  .footer {
    padding: 14px 16px;
    margin-top: 8px;
    border-top: 1px solid var(--border);
  }
  .portal-link {
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    font-size: 11px; color: var(--text3);
    text-decoration: none;
    font-family: var(--font-mono);
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: border-color 120ms, color 120ms;
  }
  .portal-link:hover { border-color: var(--accent); color: var(--accent); }

  /* status toast */
  .toast {
    position: fixed; bottom: 60px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text); font-size: 11px;
    font-family: var(--font-mono);
    padding: 7px 14px; border-radius: 6px;
    opacity: 0; pointer-events: none;
    transition: opacity 180ms, transform 180ms;
    white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .divider { height: 1px; background: var(--border); margin: 12px 16px 0; }
</style>
</head>
<body>

<!-- ===== UPDATE BANNER (hidden by default) ===== -->
<div id="update-banner" style="display:none;background:linear-gradient(90deg,#00ffcc 0%,#00ccaa 100%);color:#000;padding:10px 14px;font-size:12px;font-weight:600;display:none;align-items:center;justify-content:space-between;gap:8px;font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,system-ui,sans-serif;cursor:pointer;">
  <span>🔄 Update available — <span id="banner-version">v?</span></span>
  <span style="display:flex;gap:6px;align-items:center;">
    <button id="banner-update" style="background:rgba(0,0,0,0.18);color:#000;border:none;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;">Update</button>
    <button id="banner-dismiss" style="background:transparent;color:#000;border:none;padding:4px 6px;font-size:14px;cursor:pointer;line-height:1;" title="Dismiss">×</button>
  </span>
</div>

<div class="topbar">
  <div class="brand">JANU<b>NET</b></div>
  <div class="search-wrap">
    <input
      type="text"
      class="search-input"
      id="search-input"
      placeholder="type a domain…"
      autocomplete="off"
    >
    <button class="go-btn" id="go-btn">GO</button>
    <div class="autocomplete" id="autocomplete"></div>
  </div>
</div>

<!-- Favorites -->
<div class="section" id="fav-section">
  <div class="section-label">⭐ Favorites</div>
  <div id="fav-list"><div class="empty">no favorites yet</div></div>
</div>

<div class="divider"></div>

<!-- Recents -->
<div class="section" id="rec-section">
  <div class="section-label">
    Recent
    <button class="clear-btn" id="clear-recents">clear</button>
  </div>
  <div id="rec-list"><div class="empty">no recent visits</div></div>
</div>

<div class="footer" style="display:flex;flex-direction:column;gap:6px;">
  <a class="portal-link" href="https://gen-z-dns.vercel.app" target="_blank">
    🌐 open janunet portal
  </a>
  <button class="portal-link" id="workspace-btn" style="border:none;background:none;cursor:pointer;text-align:left;">
    ⚙️ workspace settings
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="panel.js"></script>
</body>
</html>
