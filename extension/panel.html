<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <style>
    body { font-family: 'Courier New', Courier, monospace; width: 300px; padding: 20px; background: #121212; color: #00ffcc; margin: 0; }
    h3 { text-align: center; margin-top: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 2px; }
    input { width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #00ffcc; color: #fff; box-sizing: border-box; margin-bottom: 15px; outline: none; border-radius: 4px; }
    input::placeholder { color: #555; }
    button { width: 100%; padding: 12px; background: #00ffcc; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
    button:hover { background: #00ccaa; }
  </style>
</head>
<body>
  <h3>🌐 JanuNet</h3>
  <input type="text" id="search-input" placeholder="Enter custom domain...">
  <button id="search-btn">Access Network</button>

  <script src="panel.js"></script>
</body>
</html>
