<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JanuNet Viewer</title>
<style>
  :root {
    --bg:           #0a0a0a;
    --surface:      #121212;
    --surface2:     #1a1a1a;
    --surface3:     #242424;
    --border:       #262626;
    --border-strong:#3a3a3a;
    --text:         #ededed;
    --text2:        #9a9a9a;
    --text3:        #5e5e5e;
    --accent:       #00ffcc;
    --accent-dim:   rgba(0,255,204,0.08);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); overflow: hidden; }

  /* === TOP BROWSER BAR === */
  .topbar {
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    user-select: none;
  }
  .nav-group { display: flex; gap: 2px; }
  .nav-btn {
    width: 28px; height: 28px;
    border: none; background: transparent; color: var(--text2);
    cursor: pointer; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms;
  }
  .nav-btn:hover { background: var(--surface3); color: var(--text); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn svg { width: 16px; height: 16px; stroke-width: 2; }

  /* Address pill */
  .urlbar {
    height: 30px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    display: flex; align-items: center;
    padding: 0 14px 0 12px;
    gap: 10px;
    min-width: 0;
    transition: border-color 150ms;
  }
  .urlbar:hover { border-color: var(--border-strong); }
  .lock { width: 14px; height: 14px; flex-shrink: 0; color: var(--accent); }
  .url-text {
    flex: 1; min-width: 0;
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--font-mono); font-size: 13px;
    overflow: hidden;
  }
  .url-domain { color: var(--text); font-weight: 500; letter-spacing: 0.2px; }
  .url-arrow { color: var(--text3); font-size: 10px; flex-shrink: 0; }
  .url-target {
    color: var(--text2); font-size: 11px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }

  /* Right group */
  .right-group { display: flex; align-items: center; gap: 10px; padding-right: 4px; }
  .visits {
    font-family: var(--font-mono); font-size: 11px; color: var(--text3);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .visits b { color: var(--text2); font-weight: 600; }
  .share-btn {
    height: 28px; padding: 0 12px;
    background: var(--accent-dim);
    border: 1px solid transparent;
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 120ms, border-color 120ms;
  }
  .share-btn:hover { background: rgba(0,255,204,0.14); border-color: rgba(0,255,204,0.3); }
  .share-btn svg { width: 13px; height: 13px; }
  .brand {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
  }
  .brand b { color: var(--accent); font-weight: 600; }

  /* === FRAME === */
  .frame-wrap { height: calc(100% - 44px); background: #fff; position: relative; }
  iframe { width: 100%; height: 100%; border: none; background: #fff; }

  .loading-bar {
    position: absolute; top: 0; left: 0;
    height: 2px; background: var(--accent);
    width: 0%; transition: width 300ms;
    box-shadow: 0 0 6px var(--accent);
    z-index: 5;
  }
  .loading-bar.active { width: 80%; transition: width 4s cubic-bezier(0.1, 0.7, 0.3, 0.99); }
  .loading-bar.done { width: 100%; opacity: 0; transition: width 200ms, opacity 400ms 200ms; }

  /* Error overlay */
  .error-overlay {
    position: absolute; inset: 0;
    background: var(--bg); color: var(--text2);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 40px; text-align: center;
  }
  .error-overlay.show { display: flex; }
  .error-overlay h2 { color: var(--text); font-size: 16px; margin: 0; font-weight: 600; }
  .error-overlay p { font-size: 13px; max-width: 360px; line-height: 1.5; margin: 0; }
  .error-overlay button {
    background: var(--accent); color: #000;
    border: none; padding: 10px 20px; border-radius: 6px;
    cursor: pointer; font-weight: 600; font-size: 13px;
  }

  /* === SHARE MODAL === */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; transition: opacity 180ms;
  }
  .modal-backdrop.open { display: flex; opacity: 1; }
  .modal {
    width: 420px; max-width: calc(100vw - 40px);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 12px; padding: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    transform: translateY(8px); transition: transform 180ms;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
  }
  .modal-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .modal-close {
    background: transparent; border: none; color: var(--text3);
    cursor: pointer; font-size: 20px;
    width: 24px; height: 24px; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--surface3); color: var(--text); }

  .qr-box {
    background: #fff; padding: 16px; border-radius: 10px;
    width: 200px; height: 200px;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .qr-box img { width: 100%; height: 100%; display: block; }
  .qr-loading { color: #666; font-family: var(--font-mono); font-size: 11px; }

  .share-section { margin-bottom: 12px; }
  .share-label {
    font-size: 10px; color: var(--text3);
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 6px; font-weight: 600;
  }
  .share-row { display: flex; gap: 6px; }
  .share-url {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .copy-btn {
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text2); padding: 0 12px; border-radius: 6px;
    cursor: pointer; font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    transition: background 120ms, color 120ms;
  }
  .copy-btn:hover { background: var(--border-strong); color: var(--text); }
  .copy-btn.copied { background: var(--accent-dim); color: var(--accent); border-color: rgba(0,255,204,0.3); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 18px; border-radius: 8px;
    font-size: 12px; font-family: var(--font-mono);
    opacity: 0; pointer-events: none;
    transition: opacity 180ms, transform 180ms;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="nav-group">
    <button class="nav-btn" id="back-btn" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="nav-btn" id="forward-btn" title="Forward">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <button class="nav-btn" id="refresh-btn" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
    </button>
  </div>

  <div class="urlbar">
    <span class="lock" title="Resolved via JanuNet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </span>
    <div class="url-text">
      <span class="url-domain" id="url-domain">connecting…</span>
      <span class="url-arrow">→</span>
      <span class="url-target" id="url-target"></span>
    </div>
  </div>

  <div class="right-group">
    <span class="visits" title="Total views"><b id="visit-count">—</b> views</span>
    <button class="share-btn" id="share-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
      Share
    </button>
    <span class="brand">JANU<b>NET</b></span>
  </div>
</div>

<div class="frame-wrap">
  <div class="loading-bar" id="loading-bar"></div>
  <iframe id="content-frame"></iframe>
  <div class="error-overlay" id="error-overlay">
    <h2>This site refuses to be embedded</h2>
    <p>The target site sends headers that block it from showing inside JanuNet. You can still open it in a new tab.</p>
    <button id="open-direct">Open Directly</button>
  </div>
</div>

<div class="modal-backdrop" id="share-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Share this route</div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="qr-box">
      <div class="qr-loading" id="qr-loading">generating qr…</div>
      <img id="qr-img" style="display:none" alt="QR code">
    </div>
    <div class="share-section">
      <div class="share-label">JanuNet Domain (extension users)</div>
      <div class="share-row">
        <div class="share-url" id="ext-url">—</div>
        <button class="copy-btn" data-copy="ext">Copy</button>
      </div>
    </div>
    <div class="share-section">
      <div class="share-label">Public URL (works for everyone)</div>
      <div class="share-row">
        <div class="share-url" id="public-url">—</div>
        <button class="copy-btn" data-copy="public">Copy</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="viewer.js"></script>
</body>
</html>
